services:
  # -------------------------------------------------------
  # 마스터 노드: NameNode, SecondaryNameNode, ResourceManager
  # -------------------------------------------------------
  master:
    build: .                     
    image: w3m2:latest            # worker1, worker2가 재사용할 이미지 태그
    container_name: master
    hostname: namenode              # 네트워크 안에서 다른 컨테이너가 "namenode"로 찾아올 이름
    environment:
      - ROLE=master                # start-hadoop.sh가 이 값을 보고 마스터 로직을 실행
    ports:
      - "9870:9870"   # HDFS NameNode 웹 UI
      - "8088:8088"   # YARN ResourceManager 웹 UI
      - "9000:9000"   # HDFS RPC (필요시 맥 호스트에서 직접 접근용)
    volumes:
      - namenode-data:/root/hdfs/namenode   # 컨테이너가 삭제/재생성돼도 NameNode 메타데이터 보존
      - hadoop-data:/hadoop                  # hadoop.tmp.dir, dfs.namenode.name.dir 등 /hadoop 하위 경로 보존
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml

    networks:
      - hadoop-net

  # -------------------------------------------------------
  # 워커 노드 1: DataNode, NodeManager
  # -------------------------------------------------------
  worker1:
    image: w3m2:latest            # 새로 빌드하지 않고 master가 빌드한 이미지를 그대로 사용
    container_name: worker1
    hostname: worker1
    environment:
      - ROLE=worker
    depends_on:
      - master               
    volumes:
      - worker1-data:/root/hdfs/datanode   # worker1의 실제 데이터 블록 보존
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
    networks:
      - hadoop-net

  # -------------------------------------------------------
  # 워커 노드 2: DataNode, NodeManager
  # -------------------------------------------------------
  worker2:
    image: w3m2:latest
    container_name: worker2
    hostname: worker2
    environment:
      - ROLE=worker
    depends_on:
      - master
    volumes:
      - worker2-data:/root/hdfs/datanode   # worker2의 실제 데이터 블록 보존
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml
    networks:
      - hadoop-net

# -------------------------------------------------------
# 커스텀 브리지 네트워크
# 이 네트워크에 묶인 컨테이너들은 서로 hostname(=service name)으로
# DNS 해석이 가능해짐 (예: worker1 안에서 "ping master" 가능)
# -------------------------------------------------------
networks:
  hadoop-net:
    driver: bridge

# Named Volume 선언  
volumes:
  namenode-data:
  worker1-data:
  worker2-data:
  hadoop-data: