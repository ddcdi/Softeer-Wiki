name: w4-m1

services:
  spark-master:
    build: .
    image: my-spark-cluster:latest
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8080:8080"   # Spark Master 웹 UI
      - "7077:7077"   # 마스터 <-> 워커 통신 포트
      - "4040:4040"   # 애플리케이션(Job) UI - job 실행 중일 때만 열림
    volumes:
      - ./app:/opt/spark/app
      - ./spark-events:/opt/spark/spark-events
    networks:
      - spark-net

  spark-worker-1:
    image: my-spark-cluster:latest
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    ports:
      - "8081:8081"   # Worker-1 웹 UI
    volumes:
      - ./app:/opt/spark/app
      - ./spark-events:/opt/spark/spark-events
    networks:
      - spark-net

  spark-worker-2:
    image: my-spark-cluster:latest
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    ports:
      - "8082:8081"
    volumes:
      - ./app:/opt/spark/app
      - ./spark-events:/opt/spark/spark-events
    networks:
      - spark-net

  spark-history:
    image: my-spark-cluster:latest
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=file:/opt/spark/spark-events
    ports:
      - "18080:18080" # 완료된 Spark 애플리케이션 이벤트 로그 UI
    volumes:
      - ./spark-events:/opt/spark/spark-events
    networks:
      - spark-net

networks:
  spark-net:
    name: spark-net
    driver: bridge
